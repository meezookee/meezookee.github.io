　<a href="/fragments">断片集</a
>というページを作った。古い日記からいくらか抜粋してある。2022年という年は、私が苦しみながらもなんとか思考しようともがいていた時期だったようだ。私はそのままでいたつもりなのだが、生活というものを優先するあまり（そしてそれがなかなか上手く行かないうちに）ずいぶんと情熱が錆びついてしまったものらしい。他人に誇るには気恥ずかしい程度のものであるが、しかし敢えて言ってみよう、美しいではないか、と。

　理由は敢えてここに書くまいが、昨日今日とずいぶん気分が落ち込んでいる。
